<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מלחמת כפל - MonTeach</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; 
            background-color: #f9fafb;
        }
        
        header { 
            flex: 0 0 60px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 15px; border-bottom: 2px solid #e5e7eb; background: white; border-radius: 8px;
            margin-bottom: 5px;
        }
        h1 { margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .score { font-weight: bold; color: #1e3a8a; }

        main { 
            flex: 1; display: flex; flex-direction: row; gap: 15px; padding: 5px; 
            overflow: hidden; align-items: stretch;
        }
        
        /* Game Area */
        #game-side { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            gap: 15px; background: white; padding: 15px; 
            border-radius: 12px; border: 1px solid #e5e7eb;
            min-width: 300px;
        }
        
        /* Controls wrapper with fixed height to prevent jumping */
        #controls-wrapper { 
            width: 100%; display: flex; flex-direction: column; align-items: center; 
            min-height: 400px; justify-content: flex-start;
        }

        #equation-display { 
            font-size: 2.5rem; font-weight: bold; padding: 15px; 
            border: 2px solid #1f2937; border-radius: 10px; width: 100%; 
            text-align: center; direction: ltr; margin-bottom: 15px;
        }
        
        #numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 250px; }
        .numpad-btn { padding: 12px; font-size: 1.2rem; font-weight: bold; border: 1px solid #d1d5db; border-radius: 8px; background: #f3f4f6; cursor: pointer; }
        #clear-btn { grid-column: span 3; background: #fff5f5; border: 1px solid #feb2b2; }

        /* Chart Area */
        #chart-side { 
            flex: 1.5; display: flex; flex-direction: column; align-items: center; 
            overflow: hidden; background: white; padding: 5px; border-radius: 12px;
        }
        #chart-grid { 
            display: grid; grid-template-columns: repeat(11, 1fr); gap: 1px; 
            width: 100%; height: 100%; max-height: 80vh; aspect-ratio: 1/1;
            direction: ltr; /* Force LTR for standard math chart */
        }
        .cell { 
            display: flex; align-items: center; justify-content: center; border: 1px solid #ccc; 
            font-size: clamp(0.5rem, 1vw, 0.9rem); background: white;
        }
        .header-blue { background: #3b82f6; color: white; font-weight: bold; }
        .header-red { background: #ef4444; color: white; font-weight: bold; }

        footer { flex: 0 0 30px; text-align: center; font-size: 0.9rem; font-weight: bold; color: #db2777; padding-top: 5px; }
        
        button#start-btn, button#stop-btn { 
            padding: 15px 40px; font-size: 1.2rem; background: #2563eb; color: white; 
            border: none; border-radius: 8px; cursor: pointer; width: 100%; max-width: 250px;
        }
        #stop-btn { background: #dc2626; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <a href="https://monteach.co.il/" target="_blank" style="text-decoration:none; color:#1e3a8a; font-weight:bold;">קהילת ההוראה המונטסורית - MonTeach</a>
        <h1>⚔️ מלחמת כפל ⚔️</h1>
        <div class="score" id="score">שחקן: 0 | מחשב: 0</div>
    </header>

    <main>
        <div id="game-side">
            <div id="equation-display" style="font-size: 1.5rem;">לחץ על התחל</div>
            <div id="controls-wrapper">
                <button id="start-btn">התחל משחק</button>
                <div id="numpad" style="display:none;"></div>
                <button id="stop-btn" style="display:none;">עצור</button>
            </div>
        </div>

        <div id="chart-side">
            <div id="chart-grid"></div>
        </div>
    </main>

    <footer>
        <a href="https://www.instagram.com/montessori.teaching/" target="_blank" style="color:inherit; text-decoration:none;">
            📸 לעוד תכנים מונטסוריים - עקבו באינסטגרם!
        </a>
    </footer>

    <script>
        let scoreP = 0, scoreC = 0, currentAnswer = 0, gameActive = false, timer, a, b;
        const equationEl = document.getElementById('equation-display');
        const numpadEl = document.getElementById('numpad');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const scoreEl = document.getElementById('score');

        // Init Chart (LTR Force)
        const chart = document.getElementById('chart-grid');
        chart.innerHTML = '<div class="cell header-blue">×</div>';
        for(let i=1; i<=10; i++) chart.innerHTML += `<div class="cell header-blue">${i}</div>`;
        for(let i=1; i<=10; i++) {
            chart.innerHTML += `<div class="cell header-red">${i}</div>`;
            for(let j=1; j<=10; j++) chart.innerHTML += `<div class="cell">${i*j}</div>`;
        }

        // Init Numpad
        const keys = [3,2,1, 6,5,4, 9,8,7, 0];
        keys.forEach(k => {
            const btn = document.createElement('button');
            btn.className = 'numpad-btn';
            btn.innerText = k;
            btn.onclick = () => handleInput(k);
            numpadEl.appendChild(btn);
        });
        const clearBtn = document.createElement('button');
        clearBtn.id = 'clear-btn';
        clearBtn.innerText = 'נקה';
        clearBtn.onclick = () => { currentInput = ""; equationEl.innerText = `${a} × ${b} = `; };
        numpadEl.appendChild(clearBtn);

        let currentInput = "";
        function handleInput(val) {
            if(!gameActive) return;
            currentInput += val;
            equationEl.innerText = `${a} × ${b} = ${currentInput}`;
            
            if(parseInt(currentInput) === currentAnswer) {
                gameActive = false; // Stop input
                scoreP++;
                equationEl.innerText = "צדקת! הקלף שלך! 🎉";
                winRound();
            } else if (currentInput.length >= String(currentAnswer).length) {
                // Wrong answer - CPU wins card
                gameActive = false;
                scoreC++;
                equationEl.innerText = `המחשב צדק, התשובה היא ${currentAnswer} 😞`;
                winRound();
            }
        }

        function nextRound() {
            a = Math.floor(Math.random()*10)+1;
            b = Math.floor(Math.random()*10)+1;
            currentAnswer = a * b;
            currentInput = "";
            gameActive = true;
            equationEl.style.fontSize = "2.5rem";
            equationEl.innerText = `${a} × ${b} = `;
            scoreEl.innerText = `שחקן: ${scoreP} | מחשב: ${scoreC}`;
            
            clearTimeout(timer);
            timer = setTimeout(() => { 
                if(gameActive) {
                    gameActive = false;
                    scoreC++; 
                    equationEl.innerText = `המחשב הקדים! התשובה היא ${currentAnswer} ⏱️`;
                    winRound();
                }
            }, 5000);
        }

        function winRound() {
            clearTimeout(timer);
            scoreEl.innerText = `שחקן: ${scoreP} | מחשב: ${scoreC}`;
            // Delay next card
            setTimeout(() => { if(stopBtn.style.display === 'block') nextRound(); }, 1500);
        }

        startBtn.onclick = () => {
            gameActive = true;
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            numpadEl.style.display = 'grid';
            scoreP = 0; scoreC = 0;
            equationEl.style.fontSize = "1.5rem";
            equationEl.innerText = "המשחק מתחיל! מי יפתור את התרגיל ראשון?";
            setTimeout(nextRound, 1500);
        };

        stopBtn.onclick = () => {
            gameActive = false;
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            numpadEl.style.display = 'none';
            equationEl.innerText = "לחץ על התחל";
            clearTimeout(timer);
            scoreP = 0; scoreC = 0;
            scoreEl.innerText = `שחקן: ${scoreP} | מחשב: ${scoreC}`;
        };
    </script>
</body>
</html>
