<!DOCTYPE html>
<html lang="he" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מלחמת כפל - MonTeach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100vh; overflow: hidden; margin: 0; display: flex; flex-direction: column; font-family: sans-serif; }
        .grid-cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; border: 0.5px solid #e2e8f0; }
        .header-blue { background-color: #007bff; color: white; }
        .header-red { background-color: #dc3545; color: white; }
        .game-card { font-size: 2.5rem; font-weight: 800; display: flex; align-items: center; justify-content: center; height: 100px; border: 3px solid #374151; border-radius: 1rem; }
    </style>
</head>
<body class="bg-gray-50 p-2 md:p-4">

    <header class="flex justify-between items-center pb-2 border-b mb-2">
        <a href="https://monteach.co.il/" target="_blank" class="text-blue-800 font-bold text-sm md:text-lg hover:underline">
            קהילת ההוראה המונטסורית - MonTeach
        </a>
        <h1 class="text-xl md:text-3xl font-bold flex items-center gap-2">
            ⚔️ מלחמת כפל ⚔️
        </h1>
        <div class="text-sm font-bold">
            <span class="text-blue-600">שחקן: <span id="p-score">0</span></span> | 
            <span class="text-red-600">מחשב: <span id="c-score">0</span></span>
        </div>
    </header>

    <main class="flex-grow flex flex-col md:flex-row gap-4 overflow-hidden">
        
        <!-- Multiplication Chart (LTR) -->
        <div class="w-full md:w-1/2 flex flex-col bg-white p-2 rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <h2 class="text-center font-bold text-sm mb-1">לוח הכפל</h2>
            <div id="chart" class="grid grid-cols-11 gap-0.5 flex-grow" style="direction: ltr;">
                <!-- Chart injected by JS -->
            </div>
        </div>

        <!-- Game Panel -->
        <div class="w-full md:w-1/2 flex flex-col bg-white p-4 rounded-xl shadow-sm border border-gray-200 items-center justify-center gap-4">
            <div id="card" class="game-card w-full max-w-sm shadow-lg text-center">
                לחץ על התחל
            </div>
            <div id="feedback" class="h-8 font-bold text-xl"></div>
            
            <!-- Controls -->
            <button id="start-btn" class="bg-blue-600 text-white px-8 py-4 rounded-xl text-xl font-bold hover:bg-blue-700 transition w-full max-w-sm">התחל משחק</button>
            
            <div id="numpad" class="grid grid-cols-3 gap-2 w-full max-w-sm hidden">
                <!-- Numpad injected by JS -->
            </div>
        </div>

    </main>

    <footer class="pt-2 text-center">
        <a href="https://www.instagram.com/montessori.teaching/" target="_blank" class="text-pink-600 font-bold hover:underline">
            📸 לעוד תכנים מונטסוריים - עקבו באינסטגרם!
        </a>
    </footer>

    <script>
        let deck = [];
        let currentIndex = 0;
        let player = 0;
        let computer = 0;
        let userAnswer = "";
        let timer;
        const TIME_LIMIT = 5000;

        const cardDisplay = document.getElementById('card');
        const feedbackDisplay = document.getElementById('feedback');
        const pScore = document.getElementById('p-score');
        const cScore = document.getElementById('c-score');
        const numpad = document.getElementById('numpad');
        const startBtn = document.getElementById('start-btn');

        function initDeck() {
            deck = [];
            for(let i=1; i<=10; i++) {
                for(let j=1; j<=10; j++) deck.push({a: i, b: j, res: i*j});
            }
            deck.sort(() => Math.random() - 0.5);
            currentIndex = 0; player = 0; computer = 0;
            updateScore();
        }

        function updateScore() {
            pScore.innerText = player;
            cScore.innerText = computer;
        }

        function buildChart() {
            const chart = document.getElementById('chart');
            chart.innerHTML = '';
            chart.appendChild(document.createElement('div')); // Corner
            for(let i=1; i<=10; i++) { const h=document.createElement('div'); h.className='grid-cell font-bold header-blue'; h.innerText=i; chart.appendChild(h); }
            for(let r=1; r<=10; r++) {
                const rh = document.createElement('div'); rh.className='grid-cell font-bold header-red'; rh.innerText=r; chart.appendChild(rh);
                for(let c=1; c<=10; c++) {
                    const cell = document.createElement('div'); cell.className='grid-cell bg-white'; cell.innerText=r*c; chart.appendChild(cell);
                }
            }
        }

        [1,2,3,4,5,6,7,8,9,0].forEach(n => {
            const btn = document.createElement('button');
            btn.className = "bg-gray-100 p-3 rounded-lg font-bold text-lg hover:bg-blue-100 transition";
            btn.innerText = n;
            btn.onclick = () => handleInput(n);
            numpad.appendChild(btn);
        });
        const clearBtn = document.createElement('button');
        clearBtn.className = "bg-red-100 p-3 rounded-lg font-bold text-lg col-span-3";
        clearBtn.innerText = "נקה";
        clearBtn.onclick = () => { userAnswer = ""; updateCardView(); };
        numpad.appendChild(clearBtn);

        function updateCardView() {
            if (currentIndex >= deck.length) { cardDisplay.innerText = "המשחק נגמר!"; return; }
            // Fixed equation format a x b =
            cardDisplay.innerText = `${deck[currentIndex].a} × ${deck[currentIndex].b} = ${userAnswer}`;
        }

        function handleInput(num) {
            userAnswer += num;
            updateCardView();
            const currentCard = deck[currentIndex];
            if (parseInt(userAnswer) === currentCard.res) nextRound(true);
            else if (userAnswer.length >= String(currentCard.res).length) nextRound(false);
        }

        function nextRound(isCorrect) {
            clearTimeout(timer);
            if (isCorrect) {
                player++;
                feedbackDisplay.innerText = "צדקת!";
                feedbackDisplay.className = "h-8 font-bold text-xl text-green-600";
            } else {
                computer++;
                feedbackDisplay.innerText = "נסה שוב";
                feedbackDisplay.className = "h-8 font-bold text-xl text-red-600";
            }
            updateScore();
            currentIndex++;
            userAnswer = "";
            
            if (currentIndex < deck.length) {
                setTimeout(() => {
                    feedbackDisplay.innerText = "";
                    updateCardView();
                    startTimer();
                }, 1000);
            } else {
                cardDisplay.innerText = "נגמרו הקלפים!";
            }
        }

        function startTimer() {
            clearTimeout(timer);
            timer = setTimeout(() => nextRound(false), TIME_LIMIT);
        }

        startBtn.onclick = () => {
            startBtn.classList.add('hidden');
            numpad.classList.remove('hidden');
            initDeck();
            updateCardView();
            startTimer();
        };

        buildChart();
    </script>
</body>
</html>
